<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%APP_TITLE%</title>
    <script>
      // Pascal Editor 内部依赖 process.env，Electron renderer 默认没有 nodeIntegration
      if (typeof window !== "undefined" && typeof window.process === "undefined") {
        window.process = { env: {} };
      }
      // 临时禁用 Pascal 后处理管线（SSGI/outline），绕过 RenderPipeline 直接 renderer.render
      // 用于排查画面空白是否由后处理管线导致。
      // 注意：post-processing.js 在模块加载时就缓存了 PERF_POST_FX_DISABLED，
      // 所以必须通过 location.replace 让页面重新加载，history.replaceState 无效。
      if (typeof window !== "undefined" && !window.location.search.includes("disable=postFx")) {
        const url = new URL(window.location.href);
        url.searchParams.set("disable", "postFx");
        window.location.replace(url.toString());
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
