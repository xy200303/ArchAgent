name: Build Desktop Packages

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck

  package-windows:
    name: Package Windows
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build installer
        run: npm run dist:win
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ArchAgent-windows
          path: release/*.exe
          if-no-files-found: error

  package-macos:
    name: Package macOS
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: macos-15-intel
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build installer
        run: npm run dist:mac
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ArchAgent-macos
          path: release/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && (needs.package-windows.result == 'success' || needs.package-macos.result == 'success')
    needs:
      - package-windows
      - package-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows installer
        if: needs.package-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: installers
          name: ArchAgent-windows
      - name: Download macOS installer
        if: needs.package-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: installers
          name: ArchAgent-macos
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: installers/*
